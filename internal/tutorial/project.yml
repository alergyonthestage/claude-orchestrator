name: tutorial
description: "Interactive tutorial and onboarding assistant for claude-orchestrator"

# No repositories — tutorial is about cco itself, not code projects
repos: []

# ── Documentation & Personal Store ───────────────────────────────────
# The tutorial agent reads cco documentation and your personal config store
# to provide accurate, up-to-date guidance.
extra_mounts:
  # claude-orchestrator documentation (always up to date with your installation)
  - source: {{CCO_REPO_ROOT}}/docs
    target: /workspace/cco-docs
    readonly: true
  # Your personal store ~/.cco (global config, packs, templates), read-only.
  # The tutorial inspects but never modifies — use `cco start config-editor`
  # (built-in) for hands-on config editing. Per-project config lives in each
  # repo's own <repo>/.cco/, not here.
  - source: {{CCO_CONFIG_DIR}}
    target: /workspace/cco-config
    readonly: true

# ── Docker options ───────────────────────────────────────────────────
docker:
  # Docker socket disabled by default for safety.
  # Enable (mount_socket: true) if you want the agent to demonstrate
  # Docker features like sibling containers or docker compose.
  mount_socket: false
  ports: []
  env: {}

auth:
  method: oauth
