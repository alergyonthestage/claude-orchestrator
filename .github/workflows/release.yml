name: Release

# Triggered by pushing a vX.Y.Z tag (scripts/release.sh does the tag+push).
# Runs the full suite + the read-only FRAMEWORK_ROOT publish gate + the npm-pack
# hygiene check, then publishes to the public npm registry via npm Trusted
# Publishing (OIDC) — NO stored token. ADR-0037 D6.
#
# One-time setup before the first CI release:
#   1) bootstrap the FIRST publish manually from a maintainer machine
#      (`npm login` + `npm publish --access public`) so the package exists;
#   2) at https://www.npmjs.com/package/@claude-orchestrator/cco/access →
#      Trusted Publisher → GitHub Actions, with EXACT fields:
#        Organization or user : alergyonthestage
#        Repository           : claude-orchestrator
#        Workflow filename    : release.yml        (filename only, NOT a path)
#        Environment          : (leave empty — this job uses no GH environment)
#        Allowed actions      : npm publish
# A mismatch in any field → the OIDC token is rejected → npm publish fails E404.
# After that, every tag push publishes here with no secret.
on:
  push:
    tags:
      - 'v*'
  # Manual trigger for fast publish-auth debugging WITHOUT a tag or the full suite.
  # Same filename → same trusted-publisher match as a real release. A successful
  # dispatch run publishes the current package.json version for real.
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # OIDC: lets npm Trusted Publishing mint a short-lived token

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # node 24 ships an OIDC-capable npm (>= 11.5.1). We deliberately DO NOT set
      # registry-url: it makes setup-node write an `_authToken` line into a temp
      # .npmrc (placeholder when NODE_AUTH_TOKEN is unset, empty when it is ""), and
      # that auth line suppresses npm's OIDC path → E404 (literal placeholder token
      # sent) or ENEEDAUTH (empty token). With no .npmrc auth line at all, npm
      # publishes to the default registry (registry.npmjs.org) via OIDC cleanly.
      # Ref: community discussion #176761 ("do NOT use registry-url with OIDC").
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Guarantee npm >= 11.5.1 (OIDC is silently skipped on older npm) and FAIL
      # LOUDLY if it isn't, so a version problem is unambiguous in the log.
      - name: Ensure an OIDC-capable npm (>= 11.5.1)
        run: |
          npm install -g npm@latest
          ver="$(npm --version)"; echo "npm version: $ver"
          major="${ver%%.*}"; rest="${ver#*.}"; minor="${rest%%.*}"
          if [ "$major" -lt 11 ] || { [ "$major" -eq 11 ] && [ "$minor" -lt 5 ]; }; then
            echo "::error::npm $ver is < 11.5.1 — OIDC trusted publishing unsupported"
            exit 1
          fi

      # OIDC auth diagnostics (cheap; helps pin down ENEEDAUTH vs E404). If the
      # token-request URL is MISSING, GitHub is not issuing an OIDC token (repo/org
      # Actions setting) — npm then has no credential → ENEEDAUTH.
      - name: OIDC diagnostics
        run: |
          echo "event_name: ${{ github.event_name }}"
          echo "repository: ${{ github.repository }}"
          echo "workflow_ref: ${{ github.workflow_ref }}"
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "OIDC request URL: PRESENT"
          else
            echo "OIDC request URL: MISSING (id-token not available to the job)"
          fi
          [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] && echo "OIDC request token: PRESENT" || echo "OIDC request token: MISSING"
          echo "--- effective npm userconfig (${NPM_CONFIG_USERCONFIG:-unset}) ---"
          sed 's/_authToken=.*/_authToken=<redacted>/' "${NPM_CONFIG_USERCONFIG:-/dev/null}" 2>/dev/null || echo "(none)"

      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(jq -r .version package.json)"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      - name: Test suite (includes the read-only FRAMEWORK_ROOT gate)
        if: github.event_name == 'push'
        run: bin/test

      - name: npm pack hygiene
        run: scripts/check-pack-hygiene.sh

      # OIDC trusted publishing: with npm >= 11.5.1 + id-token: write + a matching
      # trusted publisher and NO `_authToken` line in any .npmrc, npm mints a
      # short-lived credential and attaches provenance automatically (no token, no
      # --provenance flag needed — per the official npm docs). --access public keeps
      # the scoped package public. There is intentionally NO NODE_AUTH_TOKEN env:
      # nothing should feed an auth line, so OIDC is the only credential path.
      # --loglevel verbose surfaces the OIDC token-exchange HTTP call (a POST to the
      # registry's /-/npm/v1/oidc/ endpoint) WITHOUT printing the token itself, so a
      # failing exchange is visible. Drop the flag for the final release commit.
      # NB: E404 here = trusted-publisher config does not match this run
      # (Organization/User, Repository, Workflow filename `release.yml` exactly,
      # Environment empty); ENEEDAUTH = OIDC produced no credential — cross-check the
      # "OIDC diagnostics" step (ACTIONS_ID_TOKEN_REQUEST_URL PRESENT vs MISSING).
      - name: Publish to npm (Trusted Publishing / OIDC)
        run: npm publish --access public --loglevel verbose
