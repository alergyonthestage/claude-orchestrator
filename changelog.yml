# changelog.yml — Additive changes notification registry
#
# This file tracks additive (non-breaking) changes to cco that users should
# know about. Each entry describes a new optional feature, config field, or
# capability. Users are notified of new entries via `cco update` (summary)
# or `cco update --news` (full details).
#
# Entry format:
#   - id: <sequential integer>   # must increment; never reuse IDs
#     date: "YYYY-MM-DD"
#     type: additive
#     title: "Short description"
#     description: "Details about the new feature and how to use it"
#
# Two trackers in .cco/meta control notification behavior:
#   last_seen_changelog — updated by discovery + news, prevents repeated summary
#   last_read_changelog — updated by news only, tracks detailed reading
# Discovery shows entries with id > last_seen. News shows entries with id > last_read.

entries:
  - id: 1
    date: "2026-03-14"
    type: additive
    title: "Vault profiles for multi-PC selective sync"
    description: >
      Use vault profiles to sync different project sets to different machines.
      Create a profile with `cco vault profile create <name>`, move projects
      with `cco vault move project <name> <profile>`, and push/pull as usual.
      Shared resources (global config, packs, templates) sync automatically
      across all profiles. Without profiles, the vault works exactly as before.

  - id: 2
    date: "2026-03-14"
    type: additive
    title: "Memory is now vault-tracked, separated from claude-state"
    description: >
      Auto memory files (MEMORY.md and topic files) now live at
      `projects/<name>/memory/` instead of inside `claude-state/memory/`.
      This directory is vault-tracked, so memory syncs across machines via
      `cco vault push/pull`. Session transcripts remain in `.cco/claude-state/`
      (gitignored). Existing projects are migrated automatically by
      `cco update` (migration 008).

  - id: 3
    date: "2026-03-15"
    type: additive
    title: "Cleaner project layout — framework files hidden in .cco/"
    description: >
      All framework-managed files (.cco-meta, .cco-base/, .managed/,
      docker-compose.yml, claude-state/) are now inside per-scope .cco/
      directories. Your project root shows only files you edit: project.yml,
      .claude/, memory/, setup.sh. Existing installations are migrated
      automatically by `cco update` (migration 009). No action needed.

  - id: 4
    date: "2026-03-17"
    type: additive
    title: "Built-in tutorial — always up to date"
    description: >
      The tutorial is now built into the framework. Run `cco start tutorial`
      directly — no installation needed, always reflects the current framework
      version. Existing tutorial projects in user-config are detected by
      `cco update` (migration 010) with an option to remove them.
      For config editing capabilities, use the new config-editor template:
      `cco project create my-editor --template config-editor`.

  - id: 5
    date: "2026-03-17"
    type: additive
    title: "Config-editor project template"
    description: >
      New native template for editing your cco configuration directly. Mounts
      user-config as a read-write repository with skills for assisted project
      and pack creation. Includes safety rules for vault awareness and
      protected paths. Create with:
      `cco project create my-editor --template config-editor`.

  - id: 6
    date: "2026-03-17"
    type: additive
    title: "New-file sync option and improved update detection"
    description: >
      `cco update --sync` now offers a (N)ew-file option when merging
      conflicting files. Instead of 3-way merge, it saves the framework
      version as `.new` alongside your file for manual review — recommended
      when you've restructured a file significantly. Also, project CLAUDE.md
      is now tracked for updates (previously silent). Run `cco clean --new`
      to remove .new files after review.

  - id: 7
    date: "2026-03-17"
    type: additive
    title: "Publish-install sync — update installed projects from remote"
    description: >
      Installed projects can now receive updates from their source.
      `cco update` shows available updates from all sources (framework + remotes).
      `cco project update <name>` fetches and merges publisher updates with
      3-way merge preserving your local customizations.
      `cco project publish` now includes safety checks (migration validation,
      secret scan, framework alignment warning, diff review).
      `cco project internalize <name>` disconnects from remote source.
      `cco update --sync <project> --local` applies framework defaults directly
      on installed projects (bypass publisher chain).
      See `docs/user-guides/configuration-management.md` for the complete guide.

  - id: 8
    date: "2026-03-19"
    type: additive
    title: "Defaults alignment — improved rules, documentation practices, workspace safety"
    description: >
      Global defaults updated to align with user guides (FI-2 + FI-5).
      Key changes: `diagrams.md` renamed to `documentation.md` (includes docs
      structure practices), `workflow.md` expanded with approval gates and task
      decomposition principles, global CLAUDE.md simplified (no longer duplicates
      rule content). Managed CLAUDE.md now includes context hierarchy and workspace
      safety guidance. `/init-workspace` guides users through empty workspace setup.
      Run `cco update` to discover changes and `cco update --sync` to apply.

  - id: 9
    date: "2026-03-19"
    type: additive
    title: "PromptSubmit hook and documentation-first rule"
    description: >
      New managed hook reinforces key behavioral rules on every prompt —
      reminds the agent to check configured rules, verify git status,
      commit atomically, and consult existing docs before proposing changes.
      New managed rule (documentation-first.md) requires the agent to read
      existing design documents, ADRs, and prior analysis before starting
      new work on any topic. Both are baked into the Docker image and active
      automatically after `cco build`.

  - id: 10
    date: "2026-03-24"
    type: additive
    title: "llms.txt framework documentation support"
    description: >
      New `cco llms` command family for managing official framework documentation
      following the llms.txt standard. Install docs with `cco llms install <url>`,
      reference them from packs or projects via the new `llms:` section in
      pack.yml/project.yml, and keep them updated with `cco llms update --all`.
      Documentation files are mounted read-only and listed in the agent's context
      at session start. A new managed rule (use-official-docs.md) guides agents
      to consult installed docs before writing framework-specific code.
      Run `cco build` to include the managed rule, then `cco llms install` to
      add your first framework docs.

  - id: 11
    date: "2026-03-26"
    type: additive
    title: "Real profile isolation — vault switch changes files on disk"
    description: >
      Vault profiles now provide real git-level isolation. `vault switch`
      changes the files visible on disk — each project exists on exactly one
      branch. Key changes: `vault sync` renamed to `vault save` (commits +
      propagates shared resources to all profiles). `vault move project <name>
      <target>` physically relocates files between branches. `vault remove`
      deletes from current branch with auto-backup for last-copy scenarios.
      New profiles start empty — use `vault move` to assign projects.
      Portable files (secrets.env, session transcripts) are preserved across
      switches via shadow directories. Tracking-only profiles from Sprint 7
      must be reset manually (delete branches, re-create with new commands).

  - id: 12
    date: "2026-03-31"
    type: additive
    title: "Unified local path resolution for portable configs"
    description: >
      Project configs are now fully portable across machines. When using vault
      save or publishing to Config Repos, machine-specific repo paths and extra
      mount sources are automatically replaced with @local markers. Each PC
      maintains its own path mappings in .cco/local-paths.yml (auto-managed,
      gitignored). On `cco start`, missing paths prompt interactively with
      clone-from-URL option. New `cco project resolve <name>` command for
      explicit path management. Existing workflows require no changes —
      the first `vault save` extracts paths automatically.

  - id: 13
    date: "2026-04-22"
    type: additive
    title: "Vault runtime invariants — self-healing gitignore, ghost cleanup, legacy normalize, start guard"
    description: >
      Seven subtle bugs affecting users with pre-existing vaults and
      profile branches are now self-healed at every vault operation, so
      no migration or manual action is required. (#B15) Branches missing
      .gitignore patterns added in later migrations are auto-patched on
      the next vault command — the persistent `?? projects/*/.cco/
      project.yml.pre-save` phantom-diff loop is gone. (#B16) Profile
      switch now removes ghost project directories whose content on
      disk is entirely gitignored residue of the source branch. (#B17)
      `cco start` now refuses to launch if any repo or mount remains
      @local after resolution — no more silent empty bind mounts.
      (#B18) `cco project resolve --show` and `cco start` share a
      single effective-paths reader, eliminating the `✓ exists` vs
      `Unresolved` divergence. (#B19) Legacy vaults whose project.yml
      files were committed with real absolute host paths (pre-@local
      feature) are auto-upgraded: the real paths move into the PC-local
      `.cco/local-paths.yml`, the committed tree is rewritten to
      `@local`, and the user's working copy is left untouched. This
      unblocks `vault diff/save/switch` on legacy branches that used to
      show perpetual M, refuse to commit, and refuse to switch. (#B20)
      Every tracked file that matches the current `.gitignore` is
      auto-untracked — mktemp leftovers (`project.yml.XXXXXX`), `.bak`
      backups, and anything else that became gitignored after it was
      first committed. The mktemp sites in local-paths.sh now install
      a RETURN trap so future failed AWK rewrites can no longer leave
      orphan tempfiles. (#B21) `cco project resolve` interactive mode
      now uses the same canonical reader as `--show`, so file mounts
      are correctly accepted and the "All paths resolved" summary
      never contradicts itself. Extra mounts pointing to single files
      (not directories) are also accepted throughout. No user action
      needed — every new fix is self-applied the next time a relevant
      vault command runs.

  - id: 14
    date: "2026-06-23"
    type: breaking
    title: "Decentralized config cutover: vault removed, config moves in-repo"
    description: >
      BREAKING — the central user-config/ + vault world is replaced by the
      decentralized in-repo config model. Project config now lives in each
      repo at <repo>/.cco/ (project.yml with logical names + machine-agnostic
      url/ref coordinates; its claude/ tree; secrets.env stays gitignored).
      The global personal store moves to ~/.cco (global/.claude, packs/,
      templates/) and is versioned + multi-PC synced with
      `cco config save / push / pull` (the `cco vault *` surface is REMOVED).
      Profiles are replaced by per-user tags (`cco tag add/rm`, `cco list
      --tag`). Memory and transcripts are now machine-local STATE with NO
      sync in v1 (cross-PC/cross-team sync is a future opt-in) — they are no
      longer vault-tracked. `cco project create` is removed; the single entry
      verb is `cco init` (scaffold a repo's .cco/ + ensure ~/.cco/global),
      with `cco join` and `cco init --migrate <project>`. Sharing is via a
      sharing repo (`cco pack/template publish|install`); the central
      manifest.yml is removed (structure-based discovery). The config-editor
      is now a built-in session: `cco start config-editor`. Migration is
      offered by `cco update` (eager global, backs up your legacy vault first,
      never destructive) and `cco init --migrate` (per project, lazy). Run
      `cco update` to migrate; your legacy vault is preserved as a fallback.

  - id: 15
    date: "2026-06-25"
    type: additive
    title: "Decentralized config — lifecycle, validation & sharing commands"
    description: >
      The decentralized config model (#14) gains its lifecycle, validation and
      sharing surface — all additive; existing commands and config are unchanged.
      Project lifecycle: `cco forget <project>` deregisters a project (clears its
      machine-local index/tags/state; the repo and its committed .cco/ are left
      untouched — the index self-heals via `cco resolve --scan`).
      `cco project add repo|mount|llms|pack <name>` adds a referenced resource to
      the current project, embedding its machine-agnostic coordinate in
      project.yml and recording the local path in the index in one step (`--path`,
      url-from-origin). `cco init --template <name>` scaffolds a project from a
      template with {{VAR}} substitution across project.yml and the whole claude/
      tree. Validation: `cco config validate [--fix]` detects and (with --fix,
      confirmed) prunes orphaned internal state in STATE/CACHE/DATA;
      `cco project validate [name] [--all] [--reachable]` checks a project's
      share-readiness (coordinates present, no real host paths in committed
      config, no authored-vs-installed pack collision) with a per-severity exit
      code (0/1/2); `cco project coords [--diff | --sync --from <repo>]` reports
      and converges cross-unit coordinate divergence. Sharing & updates:
      `cco update --check` lists installed packs/templates that have an upstream
      update (read-only, 3-state, never writes, exit 0); `cco pack internalize`
      and `cco template internalize [--as <new>]` sever a referenced resource's
      upstream coordinate so it becomes a local authored source (`--as` forks
      under a new name); `cco project export --bundle-packs` carries the project's
      referenced packs in the export closure (installed on import).

  - id: 16
    date: "2026-06-27"
    type: additive
    title: "Unified `cco list` resource index"
    description: >
      Listing is consolidated under one command. `cco list` now prints a compact
      cross-resource index (KIND · NAME · TAGS) of your projects, packs,
      templates, llms docs and remotes, ordered by kind then name. `cco list
      <kind>` shows the detailed per-kind view (repo counts/status, resource
      counts, variants, …); `cco list [<kind>] --tag <t>` filters by tag and
      `--sort name` orders by name. Full detail for one resource stays on
      `cco <kind> show <name>`. The per-noun `cco project|pack|template|llms|remote
      list` verbs were removed — each prints a one-line redirect to
      `cco list <kind>` (ADR-0029). Tags and all other behaviour are unchanged.

  - id: 17
    date: "2026-06-27"
    type: additive
    title: "Uniform destructive-confirmation contract (-y / --yes)"
    description: >
      Every destructive command now follows one contract (ADR-0029 D2): it
      previews what will be removed (including the id-keyed cascade), then asks
      for confirmation. `-y`/`--yes` is the canonical skip-confirmation flag,
      accepted everywhere. `--force` keeps a distinct meaning — override a block,
      e.g. removing a pack/llms entry that is still in use — and implies `-y`.
      `cco pack remove` and `cco llms remove` now confirm unconditionally (no more
      silent removal of an unused resource), and `cco template remove` and
      `cco remote remove` gained a confirmation. Running a destructive command
      with no TTY and no `-y` now refuses with a "re-run with -y" message instead
      of acting blindly. `cco forget`, `cco config validate --fix` and
      `cco project coords --sync` already followed this contract; `cco clean` and
      `cco config pull` are non-destructive and keep their existing behaviour.

  - id: 18
    date: "2026-06-27"
    type: additive
    title: "Verb symmetry: `cco tag remove`, `cco template update`/`validate`"
    description: >
      Resource families gain symmetric verbs (ADR-0029 D3). `cco tag remove` is
      the canonical removal verb (the old `cco tag rm` keeps working as an alias).
      `cco template` reaches parity with `cco pack`: `cco template update <name>`
      (also `--all`) re-clones an installed template from its recorded source —
      superseding the old "future `cco template sync`" placeholder — and
      `cco template validate [name]` (also `--all`) checks a template's structure.
      Templates now mirror packs: create · install · update · publish · export ·
      import · internalize · show · remove · validate. The remaining family
      asymmetries are intentional and documented in each family's `--help`: a
      project has no install/publish/remove (it rides its code-repo remote;
      deregister with `cco forget`), and only `llms` has `rename`.
  - id: 19
    date: "2026-06-29"
    type: additive
    title: "Pack llms references stay re-fetchable (ADR-0032)"
    description: >
      Packs now carry their llms coordinate like projects do, closing a drift
      from the mandatory-llms-url invariant (ADR-0017 D1 / ADR-0019 D6).
      `cco pack validate` is now url-aware: a referenced-but-uninstalled llms
      prints an executable remedy ('cco llms install <url> --name <n>') when the
      manifest carries a url, or flags a share-readiness gap ('has no url
      coordinate') when it does not — at parity with `cco project validate`.
      `cco update` backfills a missing llms url into each installed pack from the
      global llms source where recoverable (idempotent). `cco resolve` now also
      heals missing url-bearing llms (interactive install/different-url/skip) —
      one heal verb for repos, mounts, and llms (P14), no separate command. New
      packs' base template documents the long form with a required url.
  - id: 20
    date: "2026-06-29"
    type: additive
    title: "Unified, greppable validate output (finding F1)"
    description: >
      `cco pack validate` and `cco template validate` now print like
      `cco project validate` (ADR-0023 D2): one "<name>: <reason>" line per
      finding plus a "validate: N issue(s) [error=E warning=W]" summary, with no
      inline ✗/⚠ symbols — severity is the exit code, and the output is
      script/grep-friendly. A valid resource still prints a "… is valid"
      confirmation. (`cco config validate` keeps its orphan-sanitization layout,
      ADR-0021.)
  - id: 21
    date: "2026-06-29"
    type: additive
    title: "cco resolve heals packs + shows every referenced resource; start reuses it"
    description: >
      `cco resolve` now heals a missing pack from its sharing-repo url
      (interactive install / use-a-different-url / skip, via `cco pack install
      --pick`) — extending the one heal verb to all four referenced-resource
      kinds: repos, extra mounts, llms, and packs (P14, ADR-0033). After healing
      it prints a status row per referenced resource (✓ resolved / ⚠ unresolved
      [+url]), so it always shows the complete picture, not only what it prompted
      for. `cco start` now invokes this same resolve surface before launch
      instead of a parallel resolution loop — a single entry point that heals all
      kinds and never hard-blocks on unresolved members.

  - id: 22
    date: "2026-06-29"
    type: additive
    title: "cco join adds the current repo as a project member (Journey E)"
    description: >
      `cco join <project> [--sync] [--name <name>]` now adds the CURRENT repo as a
      new member of an existing project (ADR-0034): it embeds the repo's
      coordinate (name + url derived from `git remote get-url origin`) into the
      project's repos[] and binds its name->path in the index. The repos[] edit is
      applied to every in-sync member; a divergent project (Case C) prompts which
      member's project.yml to update, or all. With --sync the joining repo also
      receives the project's .cco/ (Case B, respecting the ADR-0024 D2 clobber-
      guard); without it it stays a code-only member (Case A). After joining,
      commit + push the changed project.yml in each member and run `cco sync`. The
      former no-argument form (register an already-committed .cco/) is removed —
      `cco start` cwd-first and `cco resolve --scan` cover it.

  - id: 23
    date: "2026-06-29"
    type: additive
    title: "cco forget --purge deletes owned <repo>/.cco/ with backup"
    description: >
      `cco forget <project> --purge` extends deregistration with an optional,
      ownership-guarded deletion of the committed <repo>/.cco/ of every member
      repo the project OWNS (its project.yml `name:` == the project) — a repo that
      hosts a different project, is shared with another project, or is unresolved
      here is left untouched. Each deletion is preceded by a backup tar into STATE
      and a warning if the .cco/ has uncommitted changes. The default remains
      "repo untouched"; --purge is the explicit consent (works non-interactively,
      like -y), an interactive run without it asks before deleting, and a
      non-interactive run without it skips the deletion (ADR-0021 / ADR-0029 D2).

  - id: 24
    date: "2026-06-29"
    type: additive
    title: "Claude Code installed via the native installer (auto-updates in place)"
    description: >
      Claude Code is no longer baked into the Docker image via npm (an officially
      deprecated method). It is now installed at first `cco start` by the official
      native installer into a persistent host CACHE dir bind-mounted into the
      container (~/.local), so the binary and its auth grant survive restarts and
      AUTO-UPDATE in place — no `cco build` needed for upgrades, and no more
      DISABLE_AUTOUPDATER (ADR-0039). The channel/version is a new config knob
      `~/.cco/claude-version` (default `latest`; set `stable` or a pinned `x.y.z`
      to opt out). `cco build --claude-version X` remains a one-off override and
      re-pins an existing install; `cco build --no-cache` now also resets the
      install cache so the next start reinstalls fresh. `cco clean` never touches
      the install cache. First start on a fresh machine adds a one-time ~30s
      install and requires network access.

  - id: 25
    date: "2026-06-30"
    type: additive
    title: "Browse the bundled user docs offline with `cco docs`"
    description: >
      New `cco docs` command surfaces the bundled user documentation on the host,
      always matched to the installed cco version — read-only and offline. Run
      `cco docs` to list available topics, or `cco docs <topic>` to open one
      (matches a path or name under docs/users, e.g. `cco docs cli` or
      `cco docs project-setup`). It uses your `$PAGER` interactively and falls back
      to plain output in pipes/CI. The same docs are also published to the
      project's GitHub Pages site (latest); `cco docs` shows your installed
      version (ADR-0037 D9).

  - id: 26
    date: "2026-06-30"
    type: additive
    title: "`cco update` now reminds you how to upgrade cco itself"
    description: >
      `cco update` runs migrations and config discovery but does NOT upgrade the
      cco engine (the framework tree). It now detects how cco was installed
      (git clone / npm / Homebrew) and prints the matching engine-upgrade command
      at the end of a run — e.g. a clone install suggests
      `git -C <repo> pull && cco update`, an npm install suggests
      `npm update -g @claude-orchestrator/cco && cco update`. Informational only;
      nothing is changed automatically (ADR-0037 D8).

  - id: 27
    date: "2026-06-30"
    type: additive
    title: "`cco --version` and `cco --help` top-level flags"
    description: >
      cco now answers the near-universal top-level CLI flags: `cco --version`
      (or `-v`) prints the installed version, and `cco --help` (or `-h`) prints
      usage — the same as `cco help`. The version is read from package.json (the
      single source of truth), so it never drifts from the published package.
      Both are handled before any command runs and have no side effects (FI-11).

  - id: 28
    date: "2026-07-01"
    type: additive
    title: "Session access knobs: control .claude / .cco edit access per session"
    description: >
      `cco start` now resolves three orthogonal capability knobs that control how
      much of your config a session can edit (ADR-0036): `claude_access`
      (none | repo | all) governs the .claude authoring trees, `cco_access`
      (none | read | edit-project | edit-global | edit-all) governs the .cco
      framework config, and `show_host_paths` (on by default) toggles the
      host<->container path map. Defaults are unchanged (repo / none / on), so
      existing sessions behave exactly as before. Set them per session on the CLI
      (`--claude-access`, `--cco-access`, `--show-host-paths` / `--no-show-host-paths`),
      per project via an optional `access:` block in `project.yml`
      (`access.claude` / `access.cco` / `access.show_host_paths`), or as your
      machine-wide baseline in `~/.cco/access.yml`. Precedence: CLI > project.yml >
      ~/.cco/access.yml > default. `--enable-config-edit` still works as a
      deprecated alias for `--cco-access edit-project`.

  - id: 29
    date: "2026-07-01"
    type: additive
    title: "Wrapped cco in-session: run safe read/edit cco commands inside a container"
    description: >
      Under `--cco-access read` (or an edit level), `cco` now runs INSIDE the
      session container behind a whitelist shim (ADR-0036 D4). Read verbs
      (`list`, `*show`, `*validate`, `docs`, `path list`, `list remotes`,
      `project coords`) work in-session; edit levels also allow the path-free
      write verbs that go through the shared cco functions (`tag`,
      `remote add|remove`, `pack|template|llms create|update|...`, `config save`).
      Host-only verbs are refused with a "run it on the host" hint:
      container-spawning (`start/stop/build/new`), path-resolving lifecycle
      (`resolve/sync/init/join/forget/update/clean`, `project rename`), and
      network/credential ops (`config push`/`config pull`, `remote
      set-token`/`remove-token`). The real buckets are bind-mounted (DATA/CACHE
      per the edit level, STATE index-only read-only); remote tokens and real
      secret files (`secrets.env`, `*.env`/`*.key`/`*.pem`) never reach the
      container — only `*.example` skeletons are visible. Requires a rebuilt image
      (`cco build`). Default sessions (`cco_access=none`) are unaffected.

  - id: 30
    date: "2026-07-01"
    type: additive
    title: "Built-in sessions become capability presets; config-editor --all / --project"
    description: >
      The config-editor and tutorial built-ins are now presets of the session
      capability knobs (ADR-0036 D6): config-editor runs at claude_access=all /
      cco_access=edit-all, the tutorial at none / read. Both gain the wrapped
      `cco` (config-editor read+write, tutorial read-only) operating on the real
      mounted buckets, with real secret files filtered from every config mount.
      `cco start config-editor` accepts `--project <name>` (now repeatable) and a
      new `--all` to mount every resolvable project's `<repo>/.cco` for editing
      (only `<repo>/.cco`, never full repos; unresolved projects are skipped). You
      can still narrow a built-in with an explicit `--cco-access` (e.g.
      `--cco-access edit-project`). Requires a rebuilt image (`cco build`).

  - id: 31
    date: "2026-07-01"
    type: additive
    title: "Unified session-info surface: workspace.yml absorbs packs.md, adds path_map"
    description: >
      The agent-facing session context is now a single file,
      `/workspace/.claude/workspace.yml` (ADR-0041 R1). It absorbs the former
      `packs.md` as new `knowledge` and `llms` sections, so the SessionStart /
      SubagentStart hooks and the `init-workspace` skill all read one surface —
      `packs.md` is no longer generated. When `show_host_paths` is on (the
      default), the file also carries an optional `path_map`: labelled
      host↔container pairs for the mounted repos and extra mounts, so the agent
      can hand you copy-pasteable host commands. Set `--no-show-host-paths` (or
      `access.show_host_paths: false` in `project.yml`, or `show_host_paths: false`
      in `~/.cco/access.yml`) to omit it. The knowledge files themselves stay at
      `/workspace/.claude/packs/…`; only the index moved. Requires a rebuilt image
      (`cco build`).

  - id: 32
    date: "2026-07-02"
    type: additive
    title: "Optional descriptions for repos and extra_mounts in project.yml"
    description: >
      `project.yml` now accepts an optional `description:` on each `repos[]` and
      `extra_mounts[]` entry. When set, the note is surfaced to the agent in the
      session context alongside the resource (e.g. "repo: backend-api at
      /workspace/backend-api — REST API service"), giving it a one-line hint about
      each mounted resource without opening files. Descriptions live only in
      `project.yml` — the single structured source (INV-3, ADR-0042) — so there is
      no generated round-trip. Purely additive: existing projects are unaffected,
      and the fields can be omitted. Requires a rebuilt image (`cco build`) for the
      session-context injection to render them.

  - id: 33
    date: "2026-07-02"
    type: additive
    title: "Scope-aware read output in container sessions (read-project)"
    description: >
      Inside a session the wrapped `cco`'s read verbs now scope their OUTPUT to
      the session's access level (ADR-0043). At `cco_access=read-project` (the
      normal default) `cco list`, `cco list <kind>`, the `<kind> show` verbs,
      `cco project validate|coords`, and `cco path list` show only the current
      project and the packs/llms it references; personal-global resources
      (templates, remotes) and other projects are hidden. Anything hidden is
      announced with a one-line count-only notice on stderr ("N hidden by access
      scope — start a read-global session or run cco on your host"), so a hidden
      resource is never mistaken for a missing one, and a `show` of an
      out-of-scope resource degrades to a clear scope message instead of a raw
      "not found". On the host every resource is always visible (no behaviour
      change); at `read-global`/`read-all`/`edit-*` the full set is shown. Widen
      a session with `--cco-access read-global`. Requires a rebuilt image
      (`cco build`).

  - id: 34
    date: "2026-07-02"
    type: additive
    title: "Session context is injected, not a file — workspace.yml retired + cleaned up"
    description: >
      The agent-facing session context introduced in #31 as the generated file
      `/workspace/.claude/workspace.yml` is no longer written anywhere (ADR-0042).
      It is now injected directly into the SessionStart / SubagentStart context
      via the `CCO_SESSION_CONTEXT` environment variable — a generated file never
      belongs in a committed tree. `cco update` now runs a migration that removes
      any committed `claude/workspace.yml`, `claude/packs.md`, and
      `claude/scheduled_tasks.lock` older versions left in a project's
      `<repo>/.cco/`, and adds them to `.cco/.gitignore` so they never reappear
      (the removal is staged for you to commit). New projects are scaffolded
      clean. Requires a rebuilt image (`cco build`).

  - id: 35
    date: "2026-07-02"
    type: additive
    title: "Environment-aware hardening of the wrapped-cco surface (in-container)"
    description: >
      A full audit of every cco verb for container-operator (wrapped-cco)
      sessions tightened three behaviours that only affect cco run INSIDE a
      session (host usage is unchanged). `cco config validate` is now host-only
      in a container — its orphan sweep reads machine-local state (the STATE
      index of host paths) that is incoherent in a container, where it reported
      false orphans and printed host paths. `cco remote add --token` now refuses
      the token inside a container (the token store is host-only; it previously
      wrote an ephemeral secret and falsely reported it saved) — register the url
      here, then run `cco remote set-token` on your host. `cco config save` at
      cco_access=edit-project now explains that the ~/.cco store is read-only and
      needs an edit-global session, instead of a misleading "nothing to save".
      Requires a rebuilt image (`cco build`).

  - id: 36
    date: "2026-07-05"
    type: additive
    title: "Symmetric cco_access scopes, in-container self-introspection, sharper refusals"
    description: >
      The agent↔cco access model gained read/write symmetry and a batch of
      in-container UX fixes (host usage unchanged). cco_access now reads at its
      matching scope on {project, global, all}: edit-project reads at PROJECT
      scope (its own project, like read-project) rather than the whole store, and
      read-global differs from read-all only in other-project visibility. Write
      verbs are gated by their target tree — a global-store write (pack/template/
      llms/tag/remote/config save) needs edit-global+, refused cleanly otherwise.
      New `cco whoami` reports your session's own access state (levels + which
      config trees are writable). In-container `cco help` is now filtered to the
      verbs you can run, with `cco --help --host` for the full list; unknown verbs
      say so (instead of "run it on your host"), removed aliases redirect to
      `cco list <kind>`, and refusal exit codes follow 0/2/1 (ok-or-degrade /
      policy refusal / error). `cco docs` works in every session (docs are baked
      into the image), session detection is fixed (cco stop / list status), and at
      cco_access=none cco is cleanly unavailable. Requires a rebuilt image
      (`cco build`).

  - id: 37
    date: "2026-07-10"
    type: additive
    title: "Granular (global,current,others) cco access, a real privilege boundary, and in-container running status"
    description: >
      The agent↔cco access model is now an explicit three-axis capability
      (ADR-0046): `access.cco` in `project.yml` (or `--cco-access`) accepts, in
      addition to the preset scalars, a granular MAP over three independent trees —
      `global` (the rest of ~/.cco), `current` (this project's .cco), and `others`
      (other projects' .cco) — each on the lattice none < ro < rw, e.g.
      `--cco-access global=ro,current=rw,others=none`. Presets are sugar for the
      symmetric triples; unspecified axes auto-promote to the invariant floor
      (current is never `none` while cco is enabled; others <= current). Two cases
      the presets could not express are now reachable granular-only: edit every
      project's config but not the global store (global=none,current=rw,others=rw),
      and edit the global store while reading all projects (global=rw,current=rw,
      others=ro). `edit-global` is
      REDEFINED from `(rw,ro,none)` to `(rw,rw,none)` — it now also writes the
      current project's config, not just the global store. A new optional
      `access.cco.include_member_configs` (bool, default false) widens the
      `current` write span from the hosting repo's <repo>/.cco to all member repos'
      copies in a multi-repo project. Existing scalar `access.cco` values and
      omitted blocks are unaffected (additive). Enforcement no longer relies only
      on output-scoping: the machine-local internal store (STATE index, DATA, CACHE
      internals) now sits behind a real privilege boundary (ADR-0047) — a
      mode-0700 parent owned by a dedicated `cco-svc` uid that the agent cannot
      traverse, plus a small setuid helper that applies the resolved (G,Pc,Po) from
      a trusted, read-only session descriptor (never argv/env, fail-closed). A
      `read-project` agent that tries to `cat` the index gets EACCES; access-scope
      output filtering is demoted to defense-in-depth. Built-in presets flipped to
      least-privilege: the tutorial is now `read-all` (read-only teacher, full
      context, no write risk) and config-editor resolves to the minimum for its
      target (edit-project in a project, edit-global outside one, edit-all with
      `--all`). Finally, `cco list` and `cco whoami` now report a session's running
      status from a host-reconciled registry (ADR-0045): in-container status is
      shown per scope with a dedicated STATUS column and `--sort status`, and an
      out-of-scope/absent session reads as `unknown` rather than a false `stopped`.
      Requires a rebuilt image (`cco build`).

  - id: 38
    date: "2026-07-11"
    type: additive
    title: "config-editor is now minimum-privilege by mode (reads the store in project mode)"
    description: >
      `cco start config-editor` no longer defaults every mode to writing the whole
      personal store. It is now minimum-privilege BY MODE (ADR-0048): started inside
      a project (or with `--project <name>`) it resolves to `(ro,rw,none)` — the
      target project's `<repo>/.cco` is read-write while `~/.cco` is mounted
      READ-ONLY, so you edit the project and merely *reference* the store. To also
      write the store, add `--cco-access edit-global`. Started bare (outside any
      project) it resolves to the honest `(rw,none,none)` — edit the store only, no
      project in scope (the `current` axis is legitimately `none`; the INV-2 project
      floor is now conditional on a current project being in scope). `--all` /
      `--cco-access edit-all` is unchanged as the explicit broad every-project
      widener. Two coherence floors keep the tool usable: config-editor's `global`
      axis is clamped to at least `ro` (an authoring session must always SEE the
      store — a narrower `--cco-access` is raised to `read-global` with a notice),
      and its `.claude` authoring now follows the store's write level (global
      `.cco/.claude` is writable only when the store is, removing a
      writable-rules/read-only-packs asymmetry). Store-writing verbs (`cco config
      save`, pack/template/llms authoring, `cco remote add|remove`) therefore need a
      store-writable config-editor session and are refused with a "needs edit-global"
      hint in the default project mode. Requires a rebuilt image (`cco build`).

  - id: 39
    date: "2026-07-13"
    type: additive
    title: "Clearer in-session introspection: whoami redesign, cco list built-ins, project show at /workspace"
    description: >
      Session-legibility refinements (they do not change the access model). `cco
      whoami` now leads with a Session block — identity (the session envelope), the
      editing target(s) for a config-editor session, and whether code repos are
      mounted vs config-only — before the access detail, so you see WHO you are and
      WHAT you edit up front (in config-editor the envelope `config-editor` and its
      editing targets are no longer conflated). The access rows are deduplicated: a
      single `level` (the preset name, or `custom (global=…,current=…,others=…)`) plus
      an explicit `triple` (G/Pc/Po + read/write scope) — no more three identical
      views of one triple. `cco list` now surfaces the internal built-ins
      (config-editor, tutorial) as KIND `builtin`: only when running by default, or
      all with `--include-internal` / `cco list builtin` — so a running config-editor
      is visible even from another session. And a bare `cco project show` run from the
      `/workspace` root now resolves the current session project, matching how it
      already worked from inside a mounted repo directory. Requires a rebuilt image
      (`cco build`).

  - id: 40
    date: "2026-07-13"
    type: additive
    title: "claude_access becomes a concordant per-tree triple; .claude authoring defaults to read-only"
    description: >
      claude_access (Axis B) is now modelled as a per-tree triple (Cr,Cp,Cg,Co) on
      the ro<rw lattice — the repo-native, project, global, and other-projects .claude
      authoring trees — mirroring the cco (G,Pc,Po) triple (ADR-0049). The none|repo|all
      enum lives on as preset sugar, and when unspecified each axis DERIVES from your
      cco_access (Cg=G, Cp=Pc, Co=Po, Cr always read-only), so the default is never
      more permissive than your config access. Behaviour change: a normal session no
      longer authors the project/repo .claude tree by default — it is read-only unless
      you pass --claude-access repo|all (or a cco edit level). Both knobs now share one
      grammar in every source (CLI flag, project.yml access.claude, ~/.cco/access.yml):
      a scalar preset OR a granular map ({repo,current,global,others} for claude;
      {global,current,others} for cco). ~/.cco/access.yml is scaffolded commented at
      cco init as the global-default escape and gained granular-map support for both
      knobs. An explicit claude wider than cco is honored with a one-line note (never
      refused). settings.local.json stays writable via a functional-write floor even
      when a .claude tree is read-only. extra_mounts gained config_access_policy
      (ro|project|write) governing their nested .claude/.cco, which is now detected
      recursively (monorepos, extra_mounts), read-only by default. Requires a rebuilt
      image (`cco build`).

  - id: 41
    date: "2026-07-14"
    type: additive
    title: "cco init seeds the current repo into project.yml repos[] (+ --repo-name)"
    description: >
      `cco init` now seeds the repo it runs in into the project's repos[] instead of
      leaving the list empty, so `cco start` mounts it without a manual project.yml
      edit. The repo's logical name defaults to the directory basename (prompted, or
      set with the new --repo-name flag) and is an axis independent of the project
      name (--name). Its coordinate url is derived from `git remote get-url origin`
      when present, else left empty to fill in later. The machine-local index binds
      the repo under its logical name (project membership keyed by repo name), the
      same coordinate model as `cco join`. Existing projects are unaffected; this
      only changes what a fresh `cco init` scaffolds.

  - id: 42
    date: "2026-07-14"
    type: breaking
    title: "Per-project name scoping: index v2 (identity = path, name = per-project label)"
    description: >
      BREAKING (machine-local STATE only — no committed config changes) — repo and
      extra_mount logical names are now PER-PROJECT scoped. A name is a label within
      one project, not a global key; "the same resource" is decided by PATH
      coincidence, never by name (ADR-0051, supersedes ADR-0022 D2). The machine-local
      index moves to version 2 (nested project_paths: <project> -> <name> -> path,
      plus an unscoped: escape-hatch bucket for project-less `cco path set` pins). The
      upgrade is transparent and automatic: a still-v1 index is read as-is, and the
      first host-side write re-homes each flat binding under every project that lists
      it as a member (orphans -> unscoped) — no `cco update`, no migration script,
      since the index is scan-rebuildable STATE (`cco resolve --scan`). Two projects
      may now bind the same name to different paths (independent resources) and one
      path may carry different names in different projects. `cco resolve`/`cco start`
      gained an add-time disambiguation prompt: when a name already exists in another
      project, cco offers to REUSE that path (the same resource) or specify a different
      one (a homonym), flagging a git-origin/url divergence as "probably a different
      resource". Cross-project name matches are no longer refused as collisions; only a
      same-project same-name-different-path clash is refused. The name-based reverse
      lookup is replaced by a path-based one (`cco project show` "referenced by",
      `cco forget` shared-repo guard). No user action required; custom tooling that
      parsed ~/.local/state/cco/index directly must read the v2 nested layout (or
      regenerate with `cco resolve --scan`).
