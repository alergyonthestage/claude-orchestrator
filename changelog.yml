# changelog.yml — Additive changes notification registry
#
# This file tracks additive (non-breaking) changes to cco that users should
# know about. Each entry describes a new optional feature, config field, or
# capability. Users are notified of new entries via `cco update` (summary)
# or `cco update --news` (full details).
#
# Entry format:
#   - id: <sequential integer>   # must increment; never reuse IDs
#     date: "YYYY-MM-DD"
#     type: additive
#     title: "Short description"
#     description: "Details about the new feature and how to use it"
#
# Two trackers in .cco/meta control notification behavior:
#   last_seen_changelog — updated by discovery + news, prevents repeated summary
#   last_read_changelog — updated by news only, tracks detailed reading
# Discovery shows entries with id > last_seen. News shows entries with id > last_read.

entries:
  - id: 1
    date: "2026-03-14"
    type: additive
    title: "Vault profiles for multi-PC selective sync"
    description: >
      Use vault profiles to sync different project sets to different machines.
      Create a profile with `cco vault profile create <name>`, move projects
      with `cco vault move project <name> <profile>`, and push/pull as usual.
      Shared resources (global config, packs, templates) sync automatically
      across all profiles. Without profiles, the vault works exactly as before.

  - id: 2
    date: "2026-03-14"
    type: additive
    title: "Memory is now vault-tracked, separated from claude-state"
    description: >
      Auto memory files (MEMORY.md and topic files) now live at
      `projects/<name>/memory/` instead of inside `claude-state/memory/`.
      This directory is vault-tracked, so memory syncs across machines via
      `cco vault push/pull`. Session transcripts remain in `.cco/claude-state/`
      (gitignored). Existing projects are migrated automatically by
      `cco update` (migration 008).

  - id: 3
    date: "2026-03-15"
    type: additive
    title: "Cleaner project layout — framework files hidden in .cco/"
    description: >
      All framework-managed files (.cco-meta, .cco-base/, .managed/,
      docker-compose.yml, claude-state/) are now inside per-scope .cco/
      directories. Your project root shows only files you edit: project.yml,
      .claude/, memory/, setup.sh. Existing installations are migrated
      automatically by `cco update` (migration 009). No action needed.

  - id: 4
    date: "2026-03-17"
    type: additive
    title: "Built-in tutorial — always up to date"
    description: >
      The tutorial is now built into the framework. Run `cco start tutorial`
      directly — no installation needed, always reflects the current framework
      version. Existing tutorial projects in user-config are detected by
      `cco update` (migration 010) with an option to remove them.
      For config editing capabilities, use the new config-editor template:
      `cco project create my-editor --template config-editor`.

  - id: 5
    date: "2026-03-17"
    type: additive
    title: "Config-editor project template"
    description: >
      New native template for editing your cco configuration directly. Mounts
      user-config as a read-write repository with skills for assisted project
      and pack creation. Includes safety rules for vault awareness and
      protected paths. Create with:
      `cco project create my-editor --template config-editor`.

  - id: 6
    date: "2026-03-17"
    type: additive
    title: "New-file sync option and improved update detection"
    description: >
      `cco update --sync` now offers a (N)ew-file option when merging
      conflicting files. Instead of 3-way merge, it saves the framework
      version as `.new` alongside your file for manual review — recommended
      when you've restructured a file significantly. Also, project CLAUDE.md
      is now tracked for updates (previously silent). Run `cco clean --new`
      to remove .new files after review.

  - id: 7
    date: "2026-03-17"
    type: additive
    title: "Publish-install sync — update installed projects from remote"
    description: >
      Installed projects can now receive updates from their source.
      `cco update` shows available updates from all sources (framework + remotes).
      `cco project update <name>` fetches and merges publisher updates with
      3-way merge preserving your local customizations.
      `cco project publish` now includes safety checks (migration validation,
      secret scan, framework alignment warning, diff review).
      `cco project internalize <name>` disconnects from remote source.
      `cco update --sync <project> --local` applies framework defaults directly
      on installed projects (bypass publisher chain).
      See `docs/user-guides/configuration-management.md` for the complete guide.

  - id: 8
    date: "2026-03-19"
    type: additive
    title: "Defaults alignment — improved rules, documentation practices, workspace safety"
    description: >
      Global defaults updated to align with user guides (FI-2 + FI-5).
      Key changes: `diagrams.md` renamed to `documentation.md` (includes docs
      structure practices), `workflow.md` expanded with approval gates and task
      decomposition principles, global CLAUDE.md simplified (no longer duplicates
      rule content). Managed CLAUDE.md now includes context hierarchy and workspace
      safety guidance. `/init-workspace` guides users through empty workspace setup.
      Run `cco update` to discover changes and `cco update --sync` to apply.

  - id: 9
    date: "2026-03-19"
    type: additive
    title: "PromptSubmit hook and documentation-first rule"
    description: >
      New managed hook reinforces key behavioral rules on every prompt —
      reminds the agent to check configured rules, verify git status,
      commit atomically, and consult existing docs before proposing changes.
      New managed rule (documentation-first.md) requires the agent to read
      existing design documents, ADRs, and prior analysis before starting
      new work on any topic. Both are baked into the Docker image and active
      automatically after `cco build`.

  - id: 10
    date: "2026-03-24"
    type: additive
    title: "llms.txt framework documentation support"
    description: >
      New `cco llms` command family for managing official framework documentation
      following the llms.txt standard. Install docs with `cco llms install <url>`,
      reference them from packs or projects via the new `llms:` section in
      pack.yml/project.yml, and keep them updated with `cco llms update --all`.
      Documentation files are mounted read-only and listed in the agent's context
      at session start. A new managed rule (use-official-docs.md) guides agents
      to consult installed docs before writing framework-specific code.
      Run `cco build` to include the managed rule, then `cco llms install` to
      add your first framework docs.

  - id: 11
    date: "2026-03-26"
    type: additive
    title: "Real profile isolation — vault switch changes files on disk"
    description: >
      Vault profiles now provide real git-level isolation. `vault switch`
      changes the files visible on disk — each project exists on exactly one
      branch. Key changes: `vault sync` renamed to `vault save` (commits +
      propagates shared resources to all profiles). `vault move project <name>
      <target>` physically relocates files between branches. `vault remove`
      deletes from current branch with auto-backup for last-copy scenarios.
      New profiles start empty — use `vault move` to assign projects.
      Portable files (secrets.env, session transcripts) are preserved across
      switches via shadow directories. Tracking-only profiles from Sprint 7
      must be reset manually (delete branches, re-create with new commands).

  - id: 12
    date: "2026-03-31"
    type: additive
    title: "Unified local path resolution for portable configs"
    description: >
      Project configs are now fully portable across machines. When using vault
      save or publishing to Config Repos, machine-specific repo paths and extra
      mount sources are automatically replaced with @local markers. Each PC
      maintains its own path mappings in .cco/local-paths.yml (auto-managed,
      gitignored). On `cco start`, missing paths prompt interactively with
      clone-from-URL option. New `cco project resolve <name>` command for
      explicit path management. Existing workflows require no changes —
      the first `vault save` extracts paths automatically.

  - id: 13
    date: "2026-04-22"
    type: additive
    title: "Vault runtime invariants — self-healing gitignore, ghost cleanup, legacy normalize, start guard"
    description: >
      Seven subtle bugs affecting users with pre-existing vaults and
      profile branches are now self-healed at every vault operation, so
      no migration or manual action is required. (#B15) Branches missing
      .gitignore patterns added in later migrations are auto-patched on
      the next vault command — the persistent `?? projects/*/.cco/
      project.yml.pre-save` phantom-diff loop is gone. (#B16) Profile
      switch now removes ghost project directories whose content on
      disk is entirely gitignored residue of the source branch. (#B17)
      `cco start` now refuses to launch if any repo or mount remains
      @local after resolution — no more silent empty bind mounts.
      (#B18) `cco project resolve --show` and `cco start` share a
      single effective-paths reader, eliminating the `✓ exists` vs
      `Unresolved` divergence. (#B19) Legacy vaults whose project.yml
      files were committed with real absolute host paths (pre-@local
      feature) are auto-upgraded: the real paths move into the PC-local
      `.cco/local-paths.yml`, the committed tree is rewritten to
      `@local`, and the user's working copy is left untouched. This
      unblocks `vault diff/save/switch` on legacy branches that used to
      show perpetual M, refuse to commit, and refuse to switch. (#B20)
      Every tracked file that matches the current `.gitignore` is
      auto-untracked — mktemp leftovers (`project.yml.XXXXXX`), `.bak`
      backups, and anything else that became gitignored after it was
      first committed. The mktemp sites in local-paths.sh now install
      a RETURN trap so future failed AWK rewrites can no longer leave
      orphan tempfiles. (#B21) `cco project resolve` interactive mode
      now uses the same canonical reader as `--show`, so file mounts
      are correctly accepted and the "All paths resolved" summary
      never contradicts itself. Extra mounts pointing to single files
      (not directories) are also accepted throughout. No user action
      needed — every new fix is self-applied the next time a relevant
      vault command runs.
