name: {{PACK_NAME}}

# ── Knowledge files ─────────────────────────────────────────────────
# knowledge:
#   source: ~/path/to/docs    # optional; omit to use pack's own knowledge/ dir
#   files:
#     - path: guide.md
#       description: "Read when working on X"
#     - simple.md

# ── Skills (directory names under skills/) ──────────────────────────
# skills:
#   - deploy

# ── Agents (filenames under agents/) ────────────────────────────────
# agents:
#   - specialist.md

# ── Rules (filenames under rules/) ──────────────────────────────────
# rules:
#   - conventions.md

# ── LLMs.txt Framework Docs (optional) ────────────────────────────
# Reference official framework documentation installed via 'cco llms install'.
# See: docs/users/configuration/reference/project-yaml.md (§ LLMs.txt) for schema.
# Each entry carries a coordinate: 'url' is REQUIRED (ADR-0017 D1) so the doc
# stays re-fetchable when the pack is shared or moved to another machine —
# 'cco pack validate' flags a url-less entry, and 'cco resolve' fetches it.
# llms:
#   - name: svelte
#     url: https://svelte.dev/llms.txt   # required — the re-fetch coordinate
#     variant: full                       # optional
