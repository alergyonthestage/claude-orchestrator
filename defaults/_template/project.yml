name: {{PROJECT_NAME}}
description: "{{DESCRIPTION}}"

# ── Repositories ─────────────────────────────────────────────────────
repos: []
  # - path: ~/projects/my-repo        # Absolute path on host
  #   name: my-repo                    # Mount name in /workspace/

# ── Extra mounts (optional) ─────────────────────────────────────────
# extra_mounts:
#   - source: ~/documents/api-specs
#     target: /workspace/docs/api-specs
#     readonly: true

# ── Knowledge Packs (optional) ───────────────────────────────────────
# Reference named packs defined in global/packs/<name>/pack.yml.
# Each pack mounts a knowledge directory (read-only) and generates
# .claude/packs.md with @import directives on every `cco start`.
# Add `@.claude/packs.md` once to your project's CLAUDE.md to activate.
# packs:
#   - my-client-knowledge

# ── Docker options ───────────────────────────────────────────────────
docker:
  ports:
    - "3000:3000"
    - "8080:8080"
  env: {}
  # network: cc-{{PROJECT_NAME}}

# ── Authentication ───────────────────────────────────────────────────
auth:
  method: oauth         # "oauth" (default) | "api_key"

# ── MCP Servers (optional) ──────────────────────────────────────────
# Create mcp.json in this directory using Claude Code's native .mcp.json format.
# ${VAR} syntax is expanded natively by Claude Code inside the container.
# Env vars must be set in global/secrets.env, docker.env above, or --env flag.
# IMPORTANT: Unresolvable ${VAR} will cause Claude Code to ignore the entire file.
# Example mcp.json:
#   {
#     "mcpServers": {
#       "github": {
#         "type": "stdio",
#         "command": "npx",
#         "args": ["-y", "@modelcontextprotocol/server-github"],
#         "env": { "GITHUB_TOKEN": "${GITHUB_TOKEN}" }
#       }
#     }
#   }
# See: https://modelcontextprotocol.io/docs
