name: {{PROJECT_NAME}}
description: "{{DESCRIPTION}}"

# ── Repositories ─────────────────────────────────────────────────────
repos: []
  # - path: ~/projects/my-repo        # Absolute path on host
  #   name: my-repo                    # Mount name in /workspace/

# ── Extra mounts (optional) ─────────────────────────────────────────
# extra_mounts:
#   - source: ~/documents/api-specs
#     target: /workspace/docs/api-specs
#     readonly: true

# ── Knowledge Packs (optional) ───────────────────────────────────────
# Reference named packs defined in global/packs/<name>/pack.yml.
# Each pack can provide: knowledge files, skills, agents, and rules.
# On every `cco start`, knowledge files are listed in .claude/packs.md
# and injected into the session context automatically (no CLAUDE.md edit needed).
# Skills, agents, and rules are copied to .claude/ for project-scoped access.
#
# Pack schema (global/packs/<name>/pack.yml):
#   name: my-pack
#   knowledge:
#     source: ~/path/to/docs   # optional; omit to use pack's own knowledge/ dir
#     files:
#       - path: guide.md
#         description: "Read when working on X"
#       - simple.md
#   skills:
#     - deploy
#   agents:
#     - specialist.md
#   rules:
#     - conventions.md
#
# packs:
#   - my-pack

# ── Docker options ───────────────────────────────────────────────────
docker:
  # image: claude-orchestrator:latest  # Custom Docker image for this project
  # mount_socket: true    # Set false to disable Docker socket mount (security hardening)
  ports:
    - "3000:3000"
    - "8080:8080"
  env: {}
  # network: cc-{{PROJECT_NAME}}

# ── Authentication ───────────────────────────────────────────────────
auth:
  method: oauth         # "oauth" (default) | "api_key"

# ── MCP Servers (optional) ──────────────────────────────────────────
# Create mcp.json in this directory using Claude Code's native .mcp.json format.
# ${VAR} syntax is expanded natively by Claude Code inside the container.
# Env vars must be set in global/secrets.env, docker.env above, or --env flag.
# IMPORTANT: Unresolvable ${VAR} will cause Claude Code to ignore the entire file.
# Example mcp.json:
#   {
#     "mcpServers": {
#       "github": {
#         "type": "stdio",
#         "command": "npx",
#         "args": ["-y", "@modelcontextprotocol/server-github"],
#         "env": { "GITHUB_TOKEN": "${GITHUB_TOKEN}" }
#       }
#     }
#   }
# See: https://modelcontextprotocol.io/docs
